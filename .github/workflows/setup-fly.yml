name: Setup & Deploy Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: crmone
  DB_NAME:  crmone-db
  REGION:   lhr
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    name: Setup & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Auth check
        run: flyctl auth whoami

      - name: Create app
        continue-on-error: true
        run: flyctl apps create ${{ env.APP_NAME }} --org personal

      - name: Create PostgreSQL DB
        continue-on-error: true
        run: |
          flyctl postgres create \
            --name ${{ env.DB_NAME }} \
            --region ${{ env.REGION }} \
            --vm-size shared-cpu-1x \
            --volume-size 3 \
            --initial-cluster-size 1 \
            --yes

      - name: Attach PostgreSQL
        continue-on-error: true
        run: flyctl postgres attach ${{ env.DB_NAME }} --app ${{ env.APP_NAME }}

      - name: Set secrets
        run: |
          flyctl secrets set \
            AUTH_SECRET="$(openssl rand -base64 32)" \
            NEXT_PUBLIC_APP_URL="https://${{ env.APP_NAME }}.fly.dev" \
            NEXTAUTH_URL="https://${{ env.APP_NAME }}.fly.dev" \
            NODE_ENV="production" \
            --app ${{ env.APP_NAME }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Étape diagnostic : build Docker isolé avec capture d'erreur lisible
      - name: Docker build (diagnostic)
        id: docker_build
        run: |
          docker build . --progress=plain -t crmone-test 2>&1 | tee /tmp/docker-build.log || true
          EXIT_CODE=${PIPESTATUS[0]}
          
          # Écrire le résumé dans le job summary (visible dans l'UI GitHub Actions)
          echo "## Docker Build Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 /tmp/docker-build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Aussi via ::error pour les annotations
          ERRS=$(grep -E "(Error|error TS|Cannot|Module not found|npm ERR)" /tmp/docker-build.log | tail -20 || true)
          echo "::error title=Docker Build Errors::${ERRS}"
          
          tail -50 /tmp/docker-build.log
          exit $EXIT_CODE
          fi
          echo "BUILD SUCCESS ✅"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-logs
          path: /tmp/docker-build.log
          retention-days: 5


      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-logs
          path: /tmp/docker-build.log
          retention-days: 1

      - name: Commit build errors to repo
        if: failure()
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub CI"
          tail -200 /tmp/docker-build.log > /tmp/errors.txt || echo "No log" > /tmp/errors.txt
          # Écrire dans un fichier visible
          mkdir -p build-debug
          cp /tmp/errors.txt build-debug/last-build-error.txt
          git add build-debug/
          git commit -m "debug: Docker build error log [skip ci]" || true
          git push origin HEAD:main || true

      - name: Deploy to Fly.io
        run: |
          flyctl deploy \
            --app ${{ env.APP_NAME }} \
            --strategy rolling \
            --wait-timeout 300 \
            --local-only

      - name: Run migrations
        run: |
          flyctl ssh console \
            --app ${{ env.APP_NAME }} \
            --command "cd /app && npx drizzle-kit migrate --config drizzle.config.ts" \
            --quiet

      - name: Seed demo data
        continue-on-error: true
        run: |
          flyctl ssh console \
            --app ${{ env.APP_NAME }} \
            --command "cd /app && npx tsx db/seed.ts" \
            --quiet

      - name: Summary
        run: |
          echo "✅ https://${{ env.APP_NAME }}.fly.dev"
          echo "👔 admin@mon-esn.fr / admin1234"
          echo "💼 jean.dupont@mon-esn.fr / jean1234"
