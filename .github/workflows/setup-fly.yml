name: Setup & Deploy Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: crmone
  DB_NAME:  crmone-db
  REGION:   lhr
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    name: Setup & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Auth check
        run: flyctl auth whoami

      - name: Create app (idempotent)
        run: |
          flyctl apps create ${{ env.APP_NAME }} --org personal 2>&1 \
            | grep -v "already exists" || true

      - name: Create PostgreSQL (idempotent)
        run: |
          flyctl postgres create \
            --name ${{ env.DB_NAME }} \
            --region ${{ env.REGION }} \
            --vm-size shared-cpu-1x \
            --volume-size 3 \
            --initial-cluster-size 1 \
            --yes 2>&1 | grep -v "already exists" || true

      - name: Attach PostgreSQL (idempotent)
        run: |
          flyctl postgres attach ${{ env.DB_NAME }} \
            --app ${{ env.APP_NAME }} 2>&1 \
            | grep -v "already attached" || true

      - name: Configure secrets
        run: |
          flyctl secrets set \
            AUTH_SECRET="$(openssl rand -base64 32)" \
            NEXT_PUBLIC_APP_URL="https://${{ env.APP_NAME }}.fly.dev" \
            NEXTAUTH_URL="https://${{ env.APP_NAME }}.fly.dev" \
            NODE_ENV="production" \
            --app ${{ env.APP_NAME }}

      - name: Build & deploy
        run: |
          flyctl deploy \
            --app ${{ env.APP_NAME }} \
            --region ${{ env.REGION }} \
            --strategy rolling \
            --wait-timeout 300 \
            --remote-only

      - name: Run migrations
        run: |
          flyctl ssh console \
            --app ${{ env.APP_NAME }} \
            --command "cd /app && npx drizzle-kit migrate --config drizzle.config.ts" \
            --quiet

      - name: Seed demo data
        run: |
          flyctl ssh console \
            --app ${{ env.APP_NAME }} \
            --command "cd /app && npx tsx db/seed.ts" \
            --quiet || echo "Seed already done or skipped"

      - name: Done
        run: |
          echo ""
          echo "✅ ESN Manager deployed!"
          echo "🌐 https://${{ env.APP_NAME }}.fly.dev"
          echo "👔 admin@mon-esn.fr / admin1234"
          echo "💼 jean.dupont@mon-esn.fr / jean1234"
