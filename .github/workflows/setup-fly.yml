name: Setup & Deploy Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      seed:
        description: "Seed demo data?"
        required: false
        default: "yes"
      resend_api_key:
        description: "Resend API key (optional)"
        required: false
        default: ""

env:
  APP_NAME: crmone
  DB_NAME:  crmone-db
  REGION:   lhr
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  setup-and-deploy:
    name: Setup & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify auth
        run: flyctl auth whoami

      - name: Create Fly app (if not exists)
        run: |
          flyctl apps list | grep -q "^${{ env.APP_NAME }}" \
            && echo "App exists" \
            || flyctl apps create ${{ env.APP_NAME }} --org personal

      - name: Create PostgreSQL (if not exists)
        run: |
          flyctl postgres list | grep -q "${{ env.DB_NAME }}" \
            && echo "DB exists" \
            || flyctl postgres create \
                --name ${{ env.DB_NAME }} \
                --region ${{ env.REGION }} \
                --vm-size shared-cpu-1x \
                --volume-size 3 \
                --initial-cluster-size 1 \
                --yes

      - name: Attach PostgreSQL
        run: |
          flyctl postgres attach ${{ env.DB_NAME }} \
            --app ${{ env.APP_NAME }} 2>/dev/null \
            || echo "Already attached"

      - name: Set secrets
        run: |
          flyctl secrets set \
            AUTH_SECRET="$(openssl rand -base64 32)" \
            NEXT_PUBLIC_APP_URL="https://${{ env.APP_NAME }}.fly.dev" \
            NEXTAUTH_URL="https://${{ env.APP_NAME }}.fly.dev" \
            NODE_ENV="production" \
            --app ${{ env.APP_NAME }}

      - name: Set Resend secret (if provided)
        if: ${{ inputs.resend_api_key != '' }}
        run: |
          flyctl secrets set \
            RESEND_API_KEY="${{ inputs.resend_api_key }}" \
            EMAIL_FROM="${{ inputs.email_from }}" \
            --app ${{ env.APP_NAME }}

      - name: Deploy
        run: |
          flyctl deploy \
            --app ${{ env.APP_NAME }} \
            --region ${{ env.REGION }} \
            --strategy rolling \
            --wait-timeout 300 \
            --remote-only

      - name: Run DB migrations
        run: |
          flyctl ssh console \
            --app ${{ env.APP_NAME }} \
            --command "cd /app && npx drizzle-kit migrate --config drizzle.config.ts"

      - name: Seed demo data
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed == 'yes' }}
        run: |
          flyctl ssh console \
            --app ${{ env.APP_NAME }} \
            --command "cd /app && npx tsx db/seed.ts"

      - name: Summary
        run: |
          echo "App URL: https://${{ env.APP_NAME }}.fly.dev"
          echo "Dashboard: https://fly.io/apps/${{ env.APP_NAME }}"
